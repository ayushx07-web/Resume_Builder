version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: resumebuilder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-resumebuilder}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - resumebuilder-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumebuilder-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-resumebuilder}
      DB_USER: ${DB_USER:-resumebuilder}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-MyVerySecretKeyForJWTTokenGenerationAndValidation123456789}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_URL: ${APP_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:5173}
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - resumebuilder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumebuilder-frontend
    environment:
      VITE_API_BASE_URL: ${API_URL:-http://localhost:8081/api}
      VITE_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - resumebuilder-network

volumes:
  mysql-data:

networks:
  resumebuilder-network:
    driver: bridge
